 <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSTANTOWN - Official Signage Build</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { 
            --bg-dark: #0a0e14; --blue-gov: #1a365d; --neon: #39ff14; --gold: #d4af37; 
            --cat-ali: #ef4444; --cat-ele: #fbbf24; --cat-casa: #22d3ee;
            --cat-div: #f97316; --cat-via: #ffffff; --cat-var: #4b5563;
        }
        body { background: var(--bg-dark); font-family: 'Segoe UI', sans-serif; margin: 0; color: white; overflow-x: hidden; }
        header { width: 100%; background: var(--blue-gov); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 2000; }
        .screen { display: none; width: 100%; min-height: 90vh; }
        .active { display: block; }
        
        /* GRID 6 CATEGORIE */
        .grid-cats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 450px; margin: 0 auto; }
        .cat-card { height: 110px; border-radius: 25px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; color: #000; text-transform: uppercase; font-size: 13px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }

        /* VETRINA CON INSEGNA RICHIESTA */
        .offer-container { padding: 20px; max-width: 450px; margin: 0 auto; }
        .offer-card { background: white; color: #000; border-radius: 25px; overflow: hidden; border: 3px solid var(--gold); }
        .gallery-wrapper { position: relative; width: 100%; height: 250px; background: #000; }
        .gallery { width: 100%; height: 100%; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery img { width: 100%; height: 100%; flex-shrink: 0; scroll-snap-align: start; object-fit: cover; }
        
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.6); color: white; border: none; width: 35px; height: 35px; border-radius: 50%; font-size: 18px; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .arrow-left { left: 10px; } .arrow-right { right: 10px; }
        .dots { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 8px; }
        .dot { width: 7px; height: 7px; background: rgba(255,255,255,0.4); border-radius: 50%; }
        .dot.active { background: white; }

        #map { width: 100%; height: 60vh; background: #222; }
        .walking-omino { transform: scaleX(-1); } /* Omino guarda a destra verso la meta */
        .btn-main { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; background: var(--blue-gov); color: white; }
        .back-btn { color: var(--neon); background: none; border: none; padding: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div>
        <div style="font-size: 8px; color: var(--gold); letter-spacing: 1px;">ROME DIPLOMATIC PROTOCOL</div>
        <div style="font-weight: 900; font-size: 20px;">INSTANTOWN</div>
    </div>
</header>

<div id="VIEW_HOME" class="screen active">
    <div style="text-align:center; margin: 30px 0 10px; font-weight: 900; color: var(--neon);">MODALITÀ CONSUMATORE</div>
    <div class="grid-cats">
        <div class="cat-card" style="background:var(--cat-ali)" onclick="navTo('VIEW_OFFER')">ALIMENTARE</div>
        <div class="cat-card" style="background:var(--cat-ele)" onclick="navTo('VIEW_OFFER')">ELETTRONICA</div>
        <div class="cat-card" style="background:var(--cat-casa)" onclick="navTo('VIEW_OFFER')">CASA</div>
        <div class="cat-card" style="background:var(--cat-div); color:white" onclick="navTo('VIEW_OFFER')">DIVERTIMENTO</div>
        <div class="cat-card" style="background:var(--cat-via)" onclick="navTo('VIEW_OFFER')">VIAGGI</div>
        <div class="cat-card" style="background:var(--cat-var); color:white" onclick="navTo('VIEW_OFFER')">VARIE</div>
    </div>
</div>

<div id="VIEW_OFFER" class="screen">
    <button class="back-btn" onclick="navTo('VIEW_HOME')">← CATEGORIE</button>
    <div class="offer-container">
        <div class="offer-card">
            <div class="gallery-wrapper">
                <button class="nav-arrow arrow-left" onclick="moveGallery(-1)">&#10094;</button>
                <button class="nav-arrow arrow-right" onclick="moveGallery(1)">&#10095;</button>
                <div class="gallery" id="mainGallery">
                    <img src="https://www.insegneantiche.it/wp-content/uploads/2016/07/www20140103_130151.jpg">
                    <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a?auto=format&fit=crop&w=600&q=80">
                    <img src="https://images.unsplash.com/photo-1517701604599-bb29b565090c?auto=format&fit=crop&w=600&q=80">
                    <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&w=600&q=80">
                </div>
                <div class="dots"><div class="dot active"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
            </div>
            <div style="padding: 20px;">
                <div style="font-size: 11px; font-weight: bold; color: var(--blue-gov); letter-spacing: 1px;">LOCALE: CAFFÈ ROMA ANNI '30</div>
                <h2 style="margin: 5px 0;">COLAZIONE PREMIUM</h2>
                <div style="font-size: 28px; font-weight: 900; color: #e11d48;">€ 2.00 <small style="font-size:14px; text-decoration:line-through; color:#999;">€ 3.50</small></div>
                <p style="font-size: 11px; color: #666; margin: 10px 0;">Identifica l'insegna in ferro battuto della prima foto per trovare il locale.</p>
                <button class="btn-main" onclick="startNavigation()">BLOCCA E RAGGIUNGI (140m)</button>
            </div>
        </div>
    </div>
</div>

<div id="VIEW_MAP" class="screen">
    <div id="map"></div>
    <div style="padding: 15px; text-align:center; background:var(--bg-dark);">
        <div id="dist-val" style="font-size: 22px; color: #ef4444; font-weight: 900;">DISTANZA: 140M</div>
        <button class="btn-main" style="background:#333;" onclick="navTo('VIEW_HOME')">ANNULLA</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const START = [41.9234, 12.4913]; const END = [41.9246, 12.4925];   
    let map, marker;

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'VIEW_MAP') initMap();
    }

    function moveGallery(direction) {
        const gal = document.getElementById('mainGallery');
        gal.scrollBy({ left: direction * gal.offsetWidth, behavior: 'smooth' });
    }

    const gallery = document.getElementById('mainGallery');
    gallery.addEventListener('scroll', () => {
        const index = Math.round(gallery.scrollLeft / gallery.offsetWidth);
        document.querySelectorAll('.dot').forEach((dot, i) => dot.classList.toggle('active', i === index));
    });

    function initMap() {
        if (!map) {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView(START, 18);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.polyline([START, END], { color: '#ef4444', weight: 6 }).addTo(map);
            let ominoIcon = L.divIcon({
                className: 'walking-omino',
                html: '<div style="font-size:35px; transform: scaleX(-1);">🚶‍♂️</div>',
                iconSize:[40,40], iconAnchor:[20,35]
            });
            marker = L.marker(START, {icon: ominoIcon}).addTo(map);
            L.marker(END, {icon: L.divIcon({html:'📍', iconSize:[30,30]})}).addTo(map);
        } else { marker.setLatLng(START); }
    }

    function startNavigation() {
        navTo('VIEW_MAP');
        let progress = 0;
        const interval = setInterval(() => {
            progress += 0.005;
            let lat = START[0] + (END[0] - START[0]) * progress;
            let lng = START[1] + (END[1] - START[1]) * progress;
            marker.setLatLng([lat, lng]);
            let m = Math.floor(140 * (1 - progress));
            document.getElementById('dist-val').innerText = m > 0 ? "DISTANZA: " + m + "M" : "ARRIVATO";
            if(progress >= 1) clearInterval(interval);
        }, 50);
    }
</script>
</body>
</html>
