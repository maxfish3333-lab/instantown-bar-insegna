<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>INSTANTOWN - DIPLOMATIC V5</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --bg: #0a0e14; --blue: #1a365d; --neon: #39ff14; --gold: #d4af37; --danger: #ef4444; }
        body { background: var(--bg); font-family: 'Segoe UI', sans-serif; margin: 0; color: white; overflow-x: hidden; }
        header { background: var(--blue); padding: 12px; border-bottom: 2px solid var(--gold); text-align: center; }
        .screen { display: none; width: 100%; min-height: 90vh; }
        .active { display: block; }
        
        /* GRIGLIA CATEGORIE */
        .grid-cats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 450px; margin: 0 auto; }
        .cat-card { height: 100px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-weight: 900; cursor: pointer; color: #000; font-size: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* SCHEDA OFFERTA */
        .offer-card { background: white; color: #000; margin: 15px; border-radius: 20px; overflow: hidden; border: 3px solid var(--gold); }
        .img-box { width: 100%; height: 200px; background: #222; position: relative; }
        .img-box img { width: 100%; height: 100%; object-fit: cover; }

        /* MAPPA */
        #map { width: 100%; height: 60vh; background: #111; }
        .nav-info { padding: 15px; text-align: center; background: var(--bg); border-top: 2px solid var(--gold); }
        .status-badge { display: inline-block; padding: 8px 15px; border-radius: 20px; font-weight: 900; margin-top: 5px; font-size: 12px; border: 2px solid white; }
        .btn-main { background: var(--blue); color: white; width: 90%; padding: 16px; border-radius: 15px; border: none; font-weight: 900; font-size: 16px; cursor: pointer; margin: 10px 0; }
        .back-btn { background: none; border: none; color: var(--neon); padding: 15px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div style="font-size: 9px; color: var(--gold); letter-spacing: 2px; font-weight: bold;">DIPLOMATIC PROTOCOL</div>
    <div style="font-weight: 900; font-size: 20px;">INSTANTOWN</div>
</header>

<div id="VIEW_HOME" class="screen active">
    <div style="text-align:center; margin: 20px 0; font-weight: 900; color: var(--neon);">SELEZIONA CATEGORIA SICURA</div>
    <div class="grid-cats">
        <div class="cat-card" style="background:#ef4444" onclick="navTo('VIEW_OFFER')">ALIMENTARE</div>
        <div class="cat-card" style="background:#fbbf24" onclick="navTo('VIEW_OFFER')">ELETTRONICA</div>
        <div class="cat-card" style="background:#22d3ee" onclick="navTo('VIEW_OFFER')">CASA</div>
        <div class="cat-card" style="background:#f97316; color:white" onclick="navTo('VIEW_OFFER')">DIVERTIMENTO</div>
        <div class="cat-card" style="background:#ffffff" onclick="navTo('VIEW_OFFER')">VIAGGI</div>
        <div class="cat-card" style="background:#4b5563; color:white" onclick="navTo('VIEW_OFFER')">VARIE</div>
    </div>
</div>

<div id="VIEW_OFFER" class="screen">
    <button class="back-btn" onclick="navTo('VIEW_HOME')">← TORNA ALLE CATEGORIE</button>
    <div class="offer-card">
        <div class="img-box">
            <img id="img-sheet" src="https://i.ibb.co/L6vMvY0/caffe-roma-insegna.jpg">
            <div style="position:absolute; bottom:0; width:100%; background:rgba(26,54,93,0.9); color:white; font-size:10px; padding:6px; text-align:center;">FOTO INSEGNA CERTIFICATA</div>
        </div>
        <div style="padding: 20px;">
            <div id="name-sheet" style="color: var(--blue); font-weight: 900; text-transform: uppercase; font-size: 14px;">CARICAMENTO...</div>
            <h2 style="margin: 5px 0; font-size: 18px;">OFFERTA RISERVATA</h2>
            <div id="price-sheet" style="font-size: 28px; font-weight: 900; color: var(--danger);">€ --.--</div>
            <button class="btn-main" onclick="navTo('VIEW_MAP')">RAGGIUNGI E SBLOCCA</button>
        </div>
    </div>
</div>

<div id="VIEW_MAP" class="screen">
    <div id="map"></div>
    <div class="nav-info">
        <div id="dist-text" style="font-size: 22px; font-weight: 900; color: var(--danger);">DISTANZA: -- M</div>
        <div id="lock-status" class="status-badge" style="background: var(--danger); color: white;">FONDI BLOCCATI (ESCROW)</div>
        <button onclick="startSim()" id="btn-start" class="btn-main" style="background: var(--neon); color: black;">AVVIA NAVIGAZIONE</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS95gpF260Q6hoggDbOKz9a65dSa0XmlFIAtmDSAJPTRMlCHXtGLZg28CkqIzhuo9-0fzpLnyCDsHD5/pub?output=csv';
    let START = [41.9234, 12.4913]; 
    let END = [41.9246, 12.4925];
    let map, marker, circle;

    async function loadData() {
        try {
            const resp = await fetch(CSV);
            const data = await resp.text();
            const rows = data.split('\n').map(r => r.split(','));
            const last = rows[rows.length - 1];
            
            document.getElementById('name-sheet').innerText = "LOCALE: " + last[2];
            document.getElementById('price-sheet').innerText = "€ " + last[7];
            if(last[5] && last[5].includes('http')) document.getElementById('img-sheet').src = last[5].trim();
            END = [parseFloat(last[3]), parseFloat(last[4])];
        } catch(e) { console.error("Errore collegamento Sheet"); }
    }

    function navTo(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'VIEW_MAP') setTimeout(initMap, 200);
    }

    function initMap() {
        if (map) map.remove();
        map = L.map('map', {zoomControl: false}).setView(START, 18);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        circle = L.circle(END, { radius: 15, color: 'red', weight: 4, fillColor: '#f03', fillOpacity: 0.4 }).addTo(map);
        L.polyline([START, END], {color: 'red', weight: 3, dashArray: '5, 10'}).addTo(map);

        const ominoIcon = L.divIcon({
            html: '<div style="font-size: 50px; transform: scaleX(-1);">🚶‍♂️</div>',
            className: 'omino', iconSize: [50, 50], iconAnchor: [25, 45]
        });
        marker = L.marker(START, {icon: ominoIcon}).addTo(map);
        L.marker(END).addTo(map);
    }

    function startSim() {
        document.getElementById('btn-start').style.display = 'none';
        let step = 0;
        const frames = 200;
        const interval = setInterval(() => {
            step++;
            let progress = step / frames;
            let lat = START[0] + (END[0] - START[0]) * progress;
            let lng = START[1] + (END[1] - START[1]) * progress;
            let pos = L.latLng(lat, lng);
            marker.setLatLng(pos);
            map.panTo(pos); 
            let dist = pos.distanceTo(L.latLng(END));
            document.getElementById('dist-text').innerText = "DISTANZA: " + Math.round(dist) + " M";
            if (dist <= 15) {
                circle.setStyle({color: '#39ff14', fillColor: '#39ff14'});
                document.getElementById('lock-status').innerText = "AREA VALIDATA - FONDI RILASCIATI";
                document.getElementById('lock-status').style.background = "var(--neon)";
                document.getElementById('lock-status').style.color = "black";
            }
            if (step >= frames) clearInterval(interval);
        }, 50);
    }
    window.onload = loadData;
</script>
</body>
</html>
